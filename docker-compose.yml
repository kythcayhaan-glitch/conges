# docker-compose.yml

services:

  # ============================================================
  # PHP 8.3-FPM
  # ============================================================
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: conges_php
    restart: unless-stopped
    environment:
      APP_ENV: dev
      APP_SECRET: "${APP_SECRET:-changeme_in_production}"
      DATABASE_URL: "mysql://conges:conges@mysql:3306/conges?serverVersion=8.0&charset=utf8mb4"
      JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
      JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
      JWT_PASSPHRASE: "${JWT_PASSPHRASE:-changeme}"
    volumes:
      - .:/var/www/html:delegated
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - conges_network

  # ============================================================
  # Nginx
  # ============================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: conges_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:delegated
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - conges_network

  # ============================================================
  # MySQL 8
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: conges_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: conges
      MYSQL_USER: conges
      MYSQL_PASSWORD: conges
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-rootsecret}"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "conges", "-pconges"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - conges_network

  # ============================================================
  # Adminer (interface DB légère)
  # ============================================================
  adminer:
    image: adminer:4
    container_name: conges_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - mysql
    networks:
      - conges_network

###> doctrine/doctrine-bundle ###
  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      # You should definitely change the password in production
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw
      # You may use a bind-mounted host directory instead, so that it is harder to accidentally remove the volume and lose all your data!
      # - ./docker/db/data:/var/lib/postgresql/data:rw
###< doctrine/doctrine-bundle ###

volumes:

###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
  mysql_data:

networks:
  conges_network:
    driver: bridge
